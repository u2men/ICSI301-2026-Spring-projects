<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="global.css">
    <style>
        

        body {
            color: var(--color-white-0);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        #case {
            height: calc(100dvh - 40px);
            aspect-ratio: 9 / 19.5;
            margin: 20px auto;
            padding: var(--padding) var(--padding-thin);
            border: 4px solid var(--color-black-0);
            border-radius: 36px;
            outline: 2px solid var(--color-white-4);
            background-color: var(--color-bg);
        }

        h1 {
            font-size: var(--size-5);
            font-weight: 100;
        }

        h2 {
            font-size: var(--size-9);
            font-weight: 100;
            text-shadow: var(--shadow-text);
        }

        h1,
        h2 {
            letter-spacing: 1px;
        }

        ul {
            display: flex;
            flex-flow: row nowrap;
            overflow-x: scroll;
            overflow-y: visible;
            align-items: center;
            height: var(--size-9);
            scrollbar-width: none;
            list-style: none;
            padding: 0;


            li {
                display: inline-block;
                position: relative;
            }
        }

        .category {
            margin: 0;
            padding: 4px 8px;
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 10px;
            color: #ddd;
            text-decoration: none;
            background-color: #444;
            transition: all 0.3s ease-in;
            &.selected {
                border-color: #fff;
                border: 1px solid #ccc;
                background-color: transparent;

            }

            &:hover {
                border-color: #fff;
                background-color: var(--color-main-5);
            }
        }



        .badge {
            padding: 2px;
            border-radius: 8px;
            position: absolute;
            top: -4px;
            left: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700;
            font-size: 7px;
            color: #222;
            background-color: #e9e9e9;
        }

        .card {
            display: inline-block;
            position: absolute;
            margin-top: var(--size-1);
            padding: 0 var(--size-1);
            width: 85px;
            height: 140px;
            border: 1px solid transparent;
            border-radius: 16px;
            background-color: #666;
            box-shadow: var(--shadow-box-thin);
            transition:all 0.3 ease-in-out;
            &:hover {
                box-shadow: var(--shadow-box);
                transform: translateX(-1px) translateY(-1px);
            }
            &.right {
                right: 0px;
                background: linear-gradient(235deg, #bdd6a8, #5b6a50);

                h3 {
                    font-size: 14px;
                }

                p {
                    font-size: 10px;
                }
            }

            h3 {
                font-weight: 100;
            }

            &.left h3 {
                display: inline-block;
                width: 50px;
                font-size: 12px;
            }


            button {
                width: 100%;
                margin-top: 4px;
                padding: 4px 0;
                border: 1px solid transparent;
                border-radius: 12px;
                background-color: #777;
                color: #eee;
                font-size: 10px;
            }
        }

        svg {
            display: inline-block;
            fill: #e1ffc9;
        }

        nav {
            background-color: #555;
            border-radius: 24px;
            position: relative;
            bottom: -190px;
            width: 100%;
            height: 40px;
            text-align: center;

            svg {
                margin: 0 20px;
                padding: 8px 0;
            }
        }

        @media (min-width: 800px) and (max-width: 1000px) {
            #case {
                aspect-ratio: 2 / 1;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --shadow-text: 2px 2px 4px var(--color-black-5);
                --color-bg: var(--color-main-7);
                --shadow-box: 4px 4px 4px var(--color-black-5);
            }
        }
    </style>
</head>

<body>
    <div id="case">
        <h1>courses</h1>
        <h2>My practical plan</h2>
        <ul>
            <li><a class="category selected" href="#all">All</a><span class="badge">11</span></li>
            <li><a class="category" href="#mantras">Mantras</a></li>
            <li><a class="category" href="#meditation">Meditation</a></li>
            <li><a class="category" href="#sleep">Sleep</a></li>
            <li><a class="category" href="#sit">Sit</a></li>
        </ul>
        <div style="position:relative;">
            <section class="card left">
                <h3>Plan for the day</h3>

                        stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <button>Affirmation</button>
                <button>Meditation</button>
                <button>Mantras</button>
            </section>
            <section class="card right">
                <h3>Sleep meditation</h3>
                <p>7 day Audio Series</p>
            </section>
        </div>

                                stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg></a></li>

        </nav>
    </div>
